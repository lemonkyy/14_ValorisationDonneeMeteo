name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend lint, test, audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install backend tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv pip-audit

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen --extra dev

      - name: Backend lint
        working-directory: backend
        run: uv run pre-commit run --all-files --config=.pre-commit-config.yaml

      - name: Backend tests
        working-directory: backend
        run: |
          DB_HOST=timescaledb \
          DB_PORT=5432 \
          DB_NAME=meteodb \
          DB_USER=infoclimat \
          DB_PASSWORD=infoclimat2026 \
          uv run pytest

      - name: Backend security audit
        working-directory: backend
        run: pip-audit --format=plain --fail-on=medium

  frontend:
    name: Frontend lint, test, audit
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend format check
        working-directory: frontend
        run: npx prettier --check "**/*.{js,ts,vue,css,json,html}"

      - name: Frontend unit tests
        working-directory: frontend
        run: npm run test:unit

      - name: Frontend security audit
        working-directory: frontend
        run: npm audit --audit-level=moderate
